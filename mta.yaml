_schema-version: 3.3.0
ID: bookstore2
version: 1.0.0
description: "SAP Business ByDesign Book Store – Internal PoC"
parameters:
  enable-parallel-deployments: true
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm install
        - ./node_modules/.bin/cds build --production
        - cp -r app gen/srv/app
modules:
  - name: bookstore2-srv
    type: nodejs
    path: gen/srv
    parameters:
      instances: 1
      buildpack: nodejs_buildpack
    build-parameters:
      builder: npm-ci
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    requires:
      - name: bookstore2-db

  - name: bookstore2-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
    requires:
      - name: bookstore2-db

resources:
  - name: bookstore2-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
