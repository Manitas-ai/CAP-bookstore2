<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SAP ByD Book Store</title>
  <script id="sap-ui-bootstrap"
    src="https://ui5.sap.com/1.120/resources/sap-ui-core.js"
    data-sap-ui-theme="sap_horizon"
    data-sap-ui-libs="sap.m,sap.ui.core"
    data-sap-ui-compatVersion="edge"
    data-sap-ui-async="true"
    data-sap-ui-preload="off"
    data-sap-ui-resourceroots='{"my.bookstore.bookshop": "./"}'
    data-sap-ui-oninit="module:sap/ui/core/ComponentSupport">
  </script>
</head>
<body class="sapUiBody" id="content">
  <div data-sap-ui-component
       data-name="my.bookstore.bookshop"
       data-id="container"
       data-settings='{"id":"bookshop"}'></div>
</body>
</html>
